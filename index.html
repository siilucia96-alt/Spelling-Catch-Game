<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Spelling Catch Game</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
}
canvas {
    display: block;
    margin: auto;
    background: #0a0a1e;
}
</style>
</head>

<body>

<canvas id="game" width="600" height="400"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// ✅ WORDS
const wordList = ["CAT","DOG","SUN","TREE","BALL","HAIR","EYES","MOUTH","HAND","LEG"];

// ✅ LOAD IMAGES
function loadImage(src){
    let img = new Image();
    img.src = src;
    return img;
}

const images = {
    "CAT": loadImage("cat.jpeg"),
    "DOG": loadImage("dog.jpeg"),
    "SUN": loadImage("sun.jpeg"),
    "TREE": loadImage("tree.jpeg"),
    "BALL": loadImage("ball.jpeg"),
    "HAIR": loadImage("hair.jpeg"),
    "EYES": loadImage("eyes.jpeg"),
    "MOUTH": loadImage("mouth.jpeg"),
    "HAND": loadImage("hand.png"),
    "LEG": loadImage("leg.jpg")
};

// ✅ SHUFFLE (NO REPEAT)
function shuffle(arr){
    for(let i=arr.length-1;i>0;i--){
        let j=Math.floor(Math.random()*(i+1));
        [arr[i],arr[j]]=[arr[j],arr[i]];
    }
}

let availableWords = [...wordList];
shuffle(availableWords);

function getNextWord(){
    if(availableWords.length===0){
        availableWords=[...wordList];
        shuffle(availableWords);
    }
    return availableWords.pop();
}

// ✅ GAME DATA
let level=1;
let score=0;
let lives=3;
let playerX=280;

let showImage=false;
let completedWord="";

function newGame(){
    let word=getNextWord();
    return {
        target:word,
        progress:"",
        x:Math.random()*550,
        y:-20,
        letter:word[0],
        speed:3+level,
        attempts:0
    };
}

let game=newGame();

// ✅ SPEECH
function speak(text){
    speechSynthesis.speak(new SpeechSynthesisUtterance(text));
}

// ✅ INPUT
let keys={};

document.addEventListener("keydown",(e)=>{
    keys[e.key]=true;

    if(showImage && e.key==="Enter"){
        showImage=false;
        game=newGame();
    }
});

document.addEventListener("keyup",(e)=>{
    keys[e.key]=false;
});

// ✅ RANDOM LETTER
function randomLetter(){
    return String.fromCharCode(65+Math.floor(Math.random()*26));
}

// ✅ GAME LOOP
function update(){

    ctx.clearRect(0,0,600,400);

    // ✅ IMAGE SCREEN
    if(showImage){

        if(images[completedWord]){
            ctx.drawImage(images[completedWord],200,80,200,200);
        }

        ctx.fillStyle="yellow";
        ctx.font="20px Arial";
        ctx.fillText("Press ENTER to continue",170,320);

        requestAnimationFrame(update);
        return;
    }

    // ✅ PLAYER
    if(keys["ArrowLeft"]) playerX-=5;
    if(keys["ArrowRight"]) playerX+=5;

    ctx.fillStyle="blue";
    ctx.fillRect(playerX,350,50,30);

    // ✅ STAR
    game.y+=game.speed;

    ctx.fillStyle="yellow";
    ctx.beginPath();
    ctx.arc(game.x,game.y,20,0,Math.PI*2);
    ctx.fill();

    // ✅ CENTER LETTER
    ctx.fillStyle="black";
    ctx.font="18px Arial";
    let w=ctx.measureText(game.letter).width;
    ctx.fillText(game.letter,game.x-w/2,game.y+6);

    let next=game.target[game.progress.length];

    // ✅ MISS FIX
    if(game.y>400){

        game.y=-20;
        game.x=Math.random()*550;

        game.attempts++;

        if(next){
            if(game.attempts>=5){
                game.letter=next;
                game.attempts=0;
            } else if(Math.random()<0.5){
                game.letter=next;
            } else {
                game.letter=randomLetter();
            }
        } else {
            game.letter=randomLetter();
        }
    }

    // ✅ COLLISION
    if(game.y>=350 && game.x>playerX && game.x<playerX+50){

        if(game.letter===next){

            game.progress+=game.letter;
            score++;
            game.attempts=0;

            if(game.progress===game.target){

                completedWord=game.target;
                speak(game.target);

                score+=5;
                level++;

                showImage=true;

            } else {
                game.letter=game.target[game.progress.length];
            }

        } else {
            lives--;
            game.letter=randomLetter();
        }

        game.y=-20;
        game.x=Math.random()*550;
    }

    // ✅ TOP LEFT UI
    ctx.fillStyle="white";
    ctx.font="16px Arial";

    ctx.fillText("Word: "+game.target,10,20);
    ctx.fillText("Score: "+score,10,40);
    ctx.fillText("Level: "+level,10,60);
    ctx.fillText("Lives: "+lives,10,80);

    // ✅ ✅ MISSING PART FIXED (PROGRESS)
    let progressText="";
    for(let i=0;i<game.target.length;i++){
        if(i<game.progress.length){
            progressText+=game.progress[i]+" ";
        }else{
            progressText+="_ ";
        }
    }

    ctx.fillText("Progress: "+progressText,10,110);

    // ✅ GAME OVER
    if(lives<=0){
        ctx.fillStyle="red";
        ctx.font="30px Arial";
        ctx.fillText("GAME OVER",150,200);
        return;
    }

    requestAnimationFrame(update);
}

update();

</script>

</body>
</html>
