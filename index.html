<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Spelling Catch Game</title>

<style>
body { margin:0; background:black; color:white; }
canvas { display:block; margin:auto; background:#0a0a1e; }
</style>
</head>

<body>
<canvas id="game" width="600" height="400"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// ✅ WORDS
const wordList = ["CAT","DOG","SUN","TREE","BALL","HAIR","EYES","MOUTH","HAND","LEG"];

// ✅ IMAGES
function loadImage(src){
    let img = new Image();
    img.src = src;
    return img;
}

const images = {
    "CAT": loadImage("cat.jpeg"),
    "DOG": loadImage("dog.jpeg"),
    "SUN": loadImage("sun.jpeg"),
    "TREE": loadImage("tree.jpeg"),
    "BALL": loadImage("ball.jpeg"),
    "HAIR": loadImage("hair.jpeg"),
    "EYES": loadImage("eyes.jpeg"),
    "MOUTH": loadImage("mouth.jpeg"),
    "HAND": loadImage("hand.png"),
    "LEG": loadImage("leg.jpg")
};

// ✅ SHUFFLE
function shuffle(arr){
    for(let i=arr.length-1;i>0;i--){
        let j=Math.floor(Math.random()*(i+1));
        [arr[i],arr[j]]=[arr[j],arr[i]];
    }
}

let availableWords=[...wordList];
shuffle(availableWords);

function getNextWord(){
    if(availableWords.length===0){
        availableWords=[...wordList];
        shuffle(availableWords);
    }
    return availableWords.pop();
}

// ✅ GAME STATE
let level=1, score=0, lives=3;
let playerX=280;

let paused=false;
let showGallery=false;
let showImage=false;

let completedWord="";
let gallery=[];
let completedSet=new Set();

// ✅ MOBILE BUTTONS
let btnLeft={x:20,y:330,w:60,h:40};
let btnRight={x:520,y:330,w:60,h:40};
let moveLeft=false;
let moveRight=false;

// ✅ TOUCH CONTROL
let touchStartX=0;

// ✅ SOUND
function playClickSound(){
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.type="square";
    osc.frequency.value=300;
    gain.gain.setValueAtTime(0.2,audioCtx.currentTime);

    osc.start();
    osc.stop(audioCtx.currentTime+0.05);
}

// ✅ SPEECH
function speak(text){
    speechSynthesis.cancel();
    let msg=new SpeechSynthesisUtterance(text);
    msg.rate=0.9;
    speechSynthesis.speak(msg);
}

document.body.addEventListener("click",()=>{
    speechSynthesis.resume();
});

// ✅ GAME
function newGame(){
    let word=getNextWord();
    return {target:word,progress:"",x:Math.random()*550,y:-20,letter:word[0],speed:3+level,attempts:0};
}

let game=newGame();

// ✅ INPUT
let keys={};

document.addEventListener("keydown",(e)=>{
    keys[e.key]=true;

    if(e.key==="p") paused=!paused;
    if(e.key==="g") showGallery=!showGallery;

    if(showImage && e.key==="Enter"){
        showImage=false;
        game=newGame();
    }

    if(e.key==="ArrowLeft"||e.key==="ArrowRight"){
        playClickSound();
    }
});

document.addEventListener("keyup",(e)=>keys[e.key]=false);

// ✅ TOUCH BUTTONS
canvas.addEventListener("touchstart",(e)=>{
    let x=e.touches[0].clientX-canvas.offsetLeft;
    let y=e.touches[0].clientY-canvas.offsetTop;

    touchStartX=e.touches[0].clientX;

    if(x>btnLeft.x && x<btnLeft.x+btnLeft.w && y>btnLeft.y && y<btnLeft.y+btnLeft.h){
        moveLeft=true;
        playClickSound();
    }

    if(x>btnRight.x && x<btnRight.x+btnRight.w && y>btnRight.y && y<btnRight.y+btnRight.h){
        moveRight=true;
        playClickSound();
    }
});

canvas.addEventListener("touchmove",(e)=>{
    let currentX=e.touches[0].clientX;
    let delta=currentX-touchStartX;
    playerX+=delta*0.3;
    touchStartX=currentX;
});

canvas.addEventListener("touchend",()=>{
    moveLeft=false;
    moveRight=false;
});

// ✅ RANDOM LETTER
function randomLetter(){
    return String.fromCharCode(65+Math.floor(Math.random()*26));
}

// ✅ LOOP
function update(){

    ctx.clearRect(0,0,600,400);

    // ✅ PAUSE
    if(paused){
        ctx.fillStyle="yellow";
        ctx.font="30px Arial";
        ctx.fillText("PAUSED",220,180);
        ctx.font="16px Arial";
        ctx.fillText("Press P to resume",200,220);
        requestAnimationFrame(update);
        return;
    }

    // ✅ GALLERY
    if(showGallery){
        ctx.fillStyle="white";
        ctx.font="20px Arial";
        ctx.fillText("GALLERY (G to exit)",150,40);

        let x=40,y=80;
        gallery.forEach(word=>{
            if(images[word]) ctx.drawImage(images[word],x,y,80,80);
            ctx.fillText(word,x,y+100);
            x+=100;
            if(x>500){x=40;y+=140;}
        });

        requestAnimationFrame(update);
        return;
    }

    // ✅ IMAGE
    if(showImage){
        if(images[completedWord]){
            ctx.drawImage(images[completedWord],200,80,200,200);
        }
        ctx.fillStyle="yellow";
        ctx.fillText("Press ENTER",230,320);
        requestAnimationFrame(update);
        return;
    }

    // ✅ MOVE
    if(keys["ArrowLeft"]||moveLeft) playerX-=5;
    if(keys["ArrowRight"]||moveRight) playerX+=5;

    if(playerX<0) playerX=0;
    if(playerX>550) playerX=550;

    ctx.fillStyle="blue";
    ctx.fillRect(playerX,350,50,30);

    // ✅ STAR
    game.y+=game.speed;

    ctx.beginPath();
    ctx.arc(game.x,game.y,20,0,Math.PI*2);
    ctx.fillStyle="yellow";
    ctx.fill();

    ctx.fillStyle="black";
    ctx.fillText(game.letter,game.x-5,game.y+5);

    let next=game.target[game.progress.length];

    if(game.y>400){
        game.y=-20;
        game.x=Math.random()*550;
        game.attempts++;

        if(game.attempts>=5){
            game.letter=next;
            game.attempts=0;
        }else{
            game.letter=Math.random()<0.5?next:randomLetter();
        }
    }

    // ✅ COLLISION
    if(game.y>=350 && game.x>playerX && game.x<playerX+50){

        if(game.letter===next){

            playClickSound();

            game.progress+=game.letter;
            score++;

            if(game.progress===game.target){

                completedWord=game.target;
                speak(completedWord);

                if(!gallery.includes(completedWord)){
                    gallery.push(completedWord);
                }

                completedSet.add(completedWord);

                if(completedSet.size===wordList.length){
                    level++;
                    game.speed=3+level;
                    completedSet.clear();
                }

                score+=5;
                showImage=true;
            }

        }else{
            lives--;
        }

        game.y=-20;
        game.x=Math.random()*550;
    }

    // ✅ UI
    ctx.fillStyle="white";
    ctx.fillText("Word: "+game.target,10,20);
    ctx.fillText("Score: "+score,10,40);
    ctx.fillText("Level: "+level,10,60);
    ctx.fillText("Lives: "+lives,10,80);

    let p="";
    for(let i=0;i<game.target.length;i++){
        p+=i<game.progress.length?game.progress[i]+" ":"_ ";
    }
    ctx.fillText("Progress: "+p,10,110);

    ctx.font="12px Arial";
    ctx.fillText("Press P to pause/resume",10,140);
    ctx.fillText("Press G to open gallery",10,160);

    // ✅ DRAW BUTTONS
    ctx.fillStyle="rgba(255,255,255,0.3)";
    ctx.fillRect(btnLeft.x,btnLeft.y,btnLeft.w,btnLeft.h);
    ctx.fillRect(btnRight.x,btnRight.y,btnRight.w,btnRight.h);

    ctx.fillStyle="white";
    ctx.fillText("◀",btnLeft.x+20,btnLeft.y+25);
    ctx.fillText("▶",btnRight.x+20,btnRight.y+25);

    if(lives<=0){
        ctx.fillStyle="red";
        ctx.font="30px Arial";
        ctx.fillText("GAME OVER",150,200);
        return;
    }

    requestAnimationFrame(update);
}

update();

</script>
</body>
</html>
