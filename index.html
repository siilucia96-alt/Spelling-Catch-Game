<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Spelling Catch Game</title>

<style>
body { margin:0; background:black; color:white; }
canvas { display:block; margin:auto; background:#0a0a1e; }
</style>
</head>

<body>

<canvas id="game" width="600" height="400"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// ✅ WORDS
const wordList = ["CAT","DOG","SUN","TREE","BALL","HAIR","EYES","MOUTH","HAND","LEG"];

// ✅ IMAGES
function loadImage(src){
    let img = new Image();
    img.src = src;
    return img;
}

const images = {
    "CAT": loadImage("cat.jpeg"),
    "DOG": loadImage("dog.jpeg"),
    "SUN": loadImage("sun.jpeg"),
    "TREE": loadImage("tree.jpeg"),
    "BALL": loadImage("ball.jpeg"),
    "HAIR": loadImage("hair.jpeg"),
    "EYES": loadImage("eyes.jpeg"),
    "MOUTH": loadImage("mouth.jpeg"),
    "HAND": loadImage("hand.png"),
    "LEG": loadImage("leg.jpg")
};

// ✅ SHUFFLE
function shuffle(arr){
    for(let i=arr.length-1;i>0;i--){
        let j=Math.floor(Math.random()*(i+1));
        [arr[i],arr[j]]=[arr[j],arr[i]];
    }
}

let availableWords=[...wordList];
shuffle(availableWords);

function getNextWord(){
    if(availableWords.length===0){
        availableWords=[...wordList];
        shuffle(availableWords);
    }
    return availableWords.pop();
}

// ✅ GAME STATE
let level=1, score=0, lives=3;
let playerX=280;

let paused=false;
let showGallery=false;
let showImage=false;

let completedWord="";
let gallery=[];
let completedSet=new Set();

// ✅ BUTTONS
let btnLeft={x:10,y:330,w:60,h:40};
let btnRight={x:530,y:330,w:60,h:40};
let btnEnter={x:250,y:330,w:100,h:40};
let btnPause={x:100,y:330,w:100,h:40};
let btnGallery={x:380,y:330,w:120,h:40};
let btnBack={x:250,y:330,w:100,h:40};
let btnResume={x:250,y:260,w:100,h:40};

let moveLeft=false;
let moveRight=false;

// ✅ AUDIO FIX (Mobile)
let audioUnlocked=false;

document.body.addEventListener("touchstart",()=>{
    speechSynthesis.resume();
    audioUnlocked=true;
},{once:true});

document.body.addEventListener("click",()=>{
    speechSynthesis.resume();
    audioUnlocked=true;
},{once:true});

// ✅ SPEAK (mobile-safe)
function speak(text){
    if(!audioUnlocked) return;

    let msg=new SpeechSynthesisUtterance(text);

    setTimeout(()=>{
        speechSynthesis.cancel();
        speechSynthesis.speak(msg);
    },100);
}

// ✅ GAME INIT
function newGame(){
    let word=getNextWord();
    return {target:word,progress:"",x:Math.random()*550,y:-20,letter:word[0],speed:3+level,attempts:0};
}

let game=newGame();

// ✅ INPUT
let keys={};

document.addEventListener("keydown",(e)=>{
    keys[e.key]=true;

    if(e.key==="p") paused=!paused;
    if(e.key==="g") showGallery=!showGallery;

    if(showImage && e.key==="Enter"){
        showImage=false;
        game=newGame();
    }
});

document.addEventListener("keyup",(e)=>keys[e.key]=false);

// ✅ TOUCH
canvas.addEventListener("touchstart",(e)=>{

    let x=e.touches[0].clientX-canvas.offsetLeft;
    let y=e.touches[0].clientY-canvas.offsetTop;

    // MOVE
    if(x>btnLeft.x && y>btnLeft.y && x<btnLeft.x+btnLeft.w && y<btnLeft.y+btnLeft.h){ moveLeft=true; }
    if(x>btnRight.x && y>btnRight.y && x<btnRight.x+btnRight.w && y<btnRight.y+btnRight.h){ moveRight=true; }

    // ENTER
    if(showImage && x>btnEnter.x && y>btnEnter.y && x<btnEnter.x+btnEnter.w && y<btnEnter.y+btnEnter.h){
        showImage=false;
        game=newGame();
    }

    // PAUSE
    if(x>btnPause.x && y>btnPause.y && x<btnPause.x+btnPause.w && y<btnPause.y+btnPause.h){
        paused=true;
    }

    // RESUME
    if(paused && x>btnResume.x && y>btnResume.y && x<btnResume.x+btnResume.w && y<btnResume.y+btnResume.h){
        paused=false;
    }

    // GALLERY
    if(x>btnGallery.x && y>btnGallery.y && x<btnGallery.x+btnGallery.w && y<btnGallery.y+btnGallery.h){
        showGallery=true;
    }

    // BACK
    if(showGallery && x>btnBack.x && y>btnBack.y && x<btnBack.x+btnBack.w && y<btnBack.y+btnBack.h){
        showGallery=false;
    }

});

canvas.addEventListener("touchend",()=>{ moveLeft=false; moveRight=false; });

// ✅ RANDOM LETTER
function randomLetter(){
    return String.fromCharCode(65+Math.floor(Math.random()*26));
}

// ✅ LOOP
function update(){

    ctx.clearRect(0,0,600,400);
    ctx.font="16px Arial";

    // ✅ PAUSE PAGE
    if(paused){
        ctx.fillStyle="yellow";
        ctx.font="30px Arial";
        ctx.fillText("PAUSED",220,200);

        // ✅ RESUME BUTTON
        ctx.fillStyle="white";
        ctx.fillRect(btnResume.x,btnResume.y,btnResume.w,btnResume.h);

        ctx.fillStyle="black";
        ctx.fillText("RESUME",btnResume.x+15,btnResume.y+25);

        return requestAnimationFrame(update);
    }

    // ✅ GALLERY
    if(showGallery){
        ctx.fillStyle="white";
        ctx.fillText("GALLERY",260,40);

        let x=40,y=80;
        gallery.forEach(w=>{
            if(images[w] && images[w].complete){
                ctx.drawImage(images[w],x,y,80,80);
            }
            ctx.fillText(w,x,y+100);
            x+=100;
            if(x>500){x=40;y+=140;}
        });

        ctx.fillRect(btnBack.x,btnBack.y,btnBack.w,btnBack.h);
        ctx.fillStyle="black";
        ctx.fillText("BACK",btnBack.x+20,btnBack.y+25);

        return requestAnimationFrame(update);
    }

    // ✅ IMAGE PAGE
    if(showImage){

        let img=images[completedWord];

        if(img && img.complete){
            ctx.drawImage(img,200,80,200,200);
        }

        ctx.fillStyle="white";
        ctx.fillText("Tap ENTER below",200,300);

        // ✅ ENTER BUTTON
        ctx.fillStyle="white";
        ctx.fillRect(btnEnter.x,btnEnter.y,btnEnter.w,btnEnter.h);

        ctx.fillStyle="black";
        ctx.fillText("ENTER",btnEnter.x+25,btnEnter.y+25);

        return requestAnimationFrame(update);
    }

    // ✅ MOVE
    if(keys["ArrowLeft"]||moveLeft) playerX-=5;
    if(keys["ArrowRight"]||moveRight) playerX+=5;

    playerX=Math.max(0,Math.min(550,playerX));

    ctx.fillStyle="blue";
    ctx.fillRect(playerX,350,50,30);

    // ✅ STAR
    game.y+=game.speed;

    ctx.beginPath();
    ctx.arc(game.x,game.y,20,0,Math.PI*2);
    ctx.fillStyle="yellow";
    ctx.fill();

    ctx.fillStyle="black";
    ctx.fillText(game.letter,game.x-5,game.y+5);

    let next=game.target[game.progress.length];

    if(game.y>400){
        game.y=-20;
        game.x=Math.random()*550;
        game.attempts++;

        game.letter=(game.attempts>=5)?next:(Math.random()<0.5?next:randomLetter());

        if(game.attempts>=5) game.attempts=0;
    }

    // ✅ COLLISION
    if(game.y>=350 && game.x>playerX && game.x<playerX+50){

        if(game.letter===next){

            game.progress+=game.letter;

            if(game.progress===game.target){

                completedWord = game.target;

                // ✅ SPEAK HERE (ONLY ONCE)
                speak(completedWord);

                if(!gallery.includes(completedWord)){
                    gallery.push(completedWord);
                }

                showImage = true;
            }

        } else {
            lives--;
        }

        game.y=-20;
        game.x=Math.random()*550;
    }

    // ✅ UI
    ctx.fillStyle="white";
    ctx.fillText("Word: "+game.target,10,20);
    ctx.fillText("Score: "+score,10,40);
    ctx.fillText("Level: "+level,10,60);
    ctx.fillText("Lives: "+lives,10,80);

    let p="";
    for(let i=0;i<game.target.length;i++){
        p+= i<game.progress.length ? game.progress[i]+" " : "_ ";
    }
    ctx.fillText("Progress: "+p,10,110);

    // ✅ BUTTONS (game only)
    ctx.fillStyle="rgba(255,255,255,0.3)";
    ctx.fillRect(btnLeft.x,btnLeft.y,btnLeft.w,btnLeft.h);
    ctx.fillRect(btnRight.x,btnRight.y,btnRight.w,btnRight.h);
    ctx.fillRect(btnPause.x,btnPause.y,btnPause.w,btnPause.h);
    ctx.fillRect(btnGallery.x,btnGallery.y,btnGallery.w,btnGallery.h);

    ctx.fillStyle="white";
    ctx.fillText("◀",btnLeft.x+20,btnLeft.y+25);
    ctx.fillText("▶",btnRight.x+20,btnRight.y+25);
    ctx.fillText("PAUSE",btnPause.x+15,btnPause.y+25);
    ctx.fillText("GAL",btnGallery.x+40,btnGallery.y+25);

    requestAnimationFrame(update);
}

update();

</script>

</body>
</html>
